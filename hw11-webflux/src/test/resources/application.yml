spring:
  r2dbc:
    url: r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  sql:
    init:
      mode: always
      data-locations: data.sql # без этого грузит из обоих файлов!!!
      schema-locations: schema.sql

  jpa:
    generate-ddl: false
    #    generate-ddl: true
    hibernate:
      ddl-auto: none
    #      ddl-auto: create-drop

    show-sql: true

logging:
  level:
    ROOT: ERROR