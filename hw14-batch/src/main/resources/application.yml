spring:
  batch:
    job:
      enabled: false

  data:
    mongodb:
      port: 0
      database: company

  datasource:
    url: jdbc:h2:mem:maindb

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.5

mongock:
  #  runner-type: "ApplicationRunner" # default
  runner-type: "InitializingBean"
  change-logs-scan-package:
    - ru.otus.hw.mongock.changelog
  mongo-db:
    write-concern:
      journal: false
    read-concern: local